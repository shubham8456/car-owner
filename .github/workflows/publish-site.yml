name: Deploy

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  id-token: write
  pages: write

jobs:
  pages:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Prepare site files
        run: |
          mkdir -p dist
          cp index.html dist/
          mkdir -p dist/src
          cp -R src/images dist/src/
          cp -R src/stylesheets dist/src/
          cp -R src/scripts dist/src/
          mkdir -p dist/data
          cp data/user-info.json dist/data/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
